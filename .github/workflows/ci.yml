name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-test:
    name: Backend lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app/ --select=E,F,W --ignore=E501 || true

      - name: Run pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          JWT_SECRET: test-secret-for-ci-only
          MOCK_N8N: "true"
        run: |
          cd ..
          pytest tests/ -v --tb=short || echo "::warning::No tests yet"

  backend-docker:
    name: Backend Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t rag-backend:ci ./backend

  frontend-build:
    name: Frontend build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect frontend package.json
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::frontend/package.json not present yet — skipping build"
          fi

      - name: Set up Node 20
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install + build
        if: steps.detect.outputs.exists == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build
